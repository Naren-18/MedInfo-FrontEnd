<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MedInfo — instant emergency medical information via QR code, no login required for first responders." />
    <meta name="theme-color" content="#0c5f80" />

    <!-- iOS: Safari doesn't support the manifest-driven install prompt
         Android/Chrome uses — these are what makes "Add to Home Screen"
         from the Share sheet launch a standalone, app-like window with the
         right icon instead of just bookmarking the page. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MedInfo" />
    <!-- Standards-track equivalent of apple-mobile-web-app-capable, read by
         Chrome/Android and by Safari 17.4+ (which deprecated the Apple-
         prefixed tag in favor of this one) — kept alongside it for older
         Safari versions that only understand the prefixed form. -->
    <meta name="mobile-web-app-capable" content="yes" />

    <title>MedInfo — Emergency Medical Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
