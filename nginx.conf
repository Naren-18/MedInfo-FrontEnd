server {
    # Railway assigns its own PORT at runtime and routes external traffic to
    # whatever the container listens on — hardcoding 80 here would make the
    # deploy fail health checks. PORT is templated in the same way
    # GATEWAY_URL is (see Dockerfile), defaulting to 80 for plain
    # `docker run` / Docker Compose where nothing sets PORT.
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip the usual text-based assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Reverse-proxy /api/* to the Gateway server-side, exactly like Vite's
    # dev proxy — the browser only ever sees same-origin requests, so no
    # CORS handling is required anywhere, including in the backend.
    # GATEWAY_URL is templated in at container start (see Dockerfile).
    location /api/ {
        proxy_pass ${GATEWAY_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — any non-file, non-/api route resolves to index.html so
    # React Router can handle client-side routes like /emergency/:id on a
    # hard refresh or direct link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets; never cache index.html itself so a new
    # deploy is picked up on next load instead of serving a stale shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
