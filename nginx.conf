# Resolves the GATEWAY_URL hostname dynamically (not just once, at nginx
# startup) — Railway's public hostnames sit behind a load balancer whose IPs
# can rotate, and a stale cached IP is exactly the "hangs, then eventually
# errors" symptom this fixes. Using a resolver + a variable in proxy_pass
# (below) is what forces nginx to actually re-resolve instead of caching
# the first answer forever.
resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=off;

server {
    # Railway assigns its own PORT at runtime and routes external traffic to
    # whatever the container listens on — hardcoding 80 here would make the
    # deploy fail health checks. PORT is templated in the same way
    # GATEWAY_URL is (see Dockerfile), defaulting to 80 for plain
    # `docker run` / Docker Compose where nothing sets PORT.
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip the usual text-based assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Reverse-proxy /api/* to the Gateway server-side, exactly like Vite's
    # dev proxy — the browser only ever sees same-origin requests, so no
    # CORS handling is required anywhere, including in the backend.
    # GATEWAY_URL is templated in at container start (see Dockerfile).
    location /api/ {
        set $upstream_gateway ${GATEWAY_URL};
        # Deliberately NO trailing path here. When proxy_pass's target is a
        # variable (needed below for dynamic DNS re-resolution), nginx does
        # NOT do its usual "replace the matched location prefix" rewrite —
        # any path written here would sit ALONGSIDE the original request
        # URI, not replace part of it, producing a mangled double path like
        # /api/api/auth/login that 404s immediately against the Gateway.
        # With no path at all, nginx forwards the client's original URI
        # (e.g. /api/auth/login) unchanged — exactly what's wanted, since
        # the Gateway's own routes already expect that same /api/... shape.
        proxy_pass $upstream_gateway;

        # Real fix for "long loading, then error" against a Railway-hosted
        # backend: Railway's edge routes incoming HTTPS requests to the
        # correct internal service by the Host header / TLS SNI. The
        # previous version sent `Host: $host` — the FRONTEND's own domain —
        # to the Gateway, which the Gateway's edge couldn't route anywhere,
        # so the request just hung until nginx's default 60s proxy timeout.
        # $proxy_host is nginx's built-in variable for "the host from the
        # proxy_pass target" — i.e. the Gateway's own domain.
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;

        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fail fast and visibly instead of hanging for nginx's 60s default —
        # if the Gateway is genuinely unreachable, the frontend should show
        # an error in a few seconds, not leave the user staring at a spinner.
        proxy_connect_timeout 10s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
    }

    # SPA fallback — any non-file, non-/api route resolves to index.html so
    # React Router can handle client-side routes like /emergency/:id on a
    # hard refresh or direct link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets; never cache index.html itself so a new
    # deploy is picked up on next load instead of serving a stale shell.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # The service worker script, its registration shim, and the manifest
    # must always be revalidated. Without this, nginx sends no
    # Cache-Control at all for them, so browsers fall back to heuristic
    # caching (commonly ~10% of the file's age since Last-Modified) — a
    # redeploy can then silently leave devices running a stale sw.js that
    # never picks up fixes, which is exactly the "worked once, then quietly
    # stopped" failure mode for a PWA.
    location ~ ^/(sw\.js|registerSW\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache";
    }
}
